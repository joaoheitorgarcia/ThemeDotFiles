##############
# OPENERS
##############
[opener]

# IMAGES
image = [
  { run = 'imv "$@"', orphan = true, desc = "imv" }
]

# VIDEOS
video = [
  { run = 'mpv --no-terminal "$@"', orphan = true, desc = "mpv" }
]

# AUDIO
audio = [
  { run = 'mpv --no-terminal "$@"', orphan = true, desc = "mpv-audio" }
]

# TEXT (nano)
edit = [
  { run = 'nano "$@"', block = true, desc = "nano" }
]

# OFFICE (OpenOffice)
office = [
  { run = 'soffice "$@"', orphan = true, desc = "OpenOffice" }
]

# PDFs (zathura)
pdf = [
  { run = 'zathura "$@"', orphan = true, desc = "zathura" }
]

# Fonts
font = [
  { run = 'xdg-open "$@"', orphan = true, desc = "Font (system)" }
]

# FALLBACK
system = [
  { run = 'xdg-open "$@"', orphan = true, desc = "System default" }
]


##############
# EXTENSION GROUPS
##############
[open]

# Image formats
image = ["png", "jpg", "jpeg", "webp", "gif", "bmp", "svg", "avif", "heic", "heif", "tif", "tiff", "jxl"]

# Video formats
video = ["mp4", "mkv", "webm", "avi", "mov", "m4v", "mpeg", "mpg", "wmv", "flv"]

# Audio formats
audio = ["mp3", "wav", "flac", "ogg", "m4a", "aac", "opus"]

# Text/code formats (add/remove as you like)
text = ["txt", "md", "log", "json", "yaml", "yml", "toml", "ini", "conf", "cfg", "csv", "tsv", "xml", "css", "js", "ts", "jsx", "tsx", "py", "go", "rs", "c", "h", "cpp", "hpp", "java", "php", "sh", "zsh", "bash", "sql", "qml", "lua", "rasi", "glsl", "tmpl", "theme", "micro", "colors", "bak"]

# Web formats (open in browser)
web = ["html", "htm", "xhtml", "mhtml"]

# Office formats (OpenOffice/soffice)
office = ["odt", "ods", "odp", "odg", "doc", "docx", "xls", "xlsx", "ppt", "pptx", "rtf"]

# PDF-like formats (zathura)
pdf = ["pdf", "djvu", "ps", "eps", "xps"]

# Font formats
font = ["ttf", "otf", "woff", "woff2"]

# Archive formats
archive = ["zip", "7z", "rar", "tar", "gz", "bz2", "xz", "zst", "tgz", "tbz2", "txz", "tzst"]

# Subtitle formats
subtitle = ["srt", "vtt", "ass"]


##############
# RULES (new Yazi syntax!)
##############

# --- IMAGES ---
[[open.rules]]
mime = "image/*"
use  = "image"

# --- VIDEOS ---
[[open.rules]]
mime = "video/*"
use  = "video"

# --- AUDIO ---
[[open.rules]]
mime = "audio/*"
use  = "audio"

# --- WEB / HTML (open in browser) ---
[[open.rules]]
mime = "text/html"
use  = "system"

[[open.rules]]
mime = "application/xhtml+xml"
use  = "system"

[[open.rules]]
url = "*.html"
use = "system"
[[open.rules]]
url = "*.htm"
use = "system"
[[open.rules]]
url = "*.xhtml"
use = "system"
[[open.rules]]
url = "*.mhtml"
use = "system"

# --- COMMON NO-EXT CONFIG FILES ---
[[open.rules]]
url = "mako"
use = "edit"
[[open.rules]]
url = "ghostty"
use = "edit"
[[open.rules]]
url = "environment"
use = "edit"
[[open.rules]]
url = "LICENSE"
use = "edit"

# --- TEXT / CODE (prefer nano) ---
[[open.rules]]
mime = "text/*"
use  = "edit"

# Some “text-like” mimes aren’t always under text/*
[[open.rules]]
mime = "application/json"
use  = "edit"

[[open.rules]]
mime = "application/xml"
use  = "edit"

[[open.rules]]
mime = "application/x-yaml"
use  = "edit"

# --- OFFICE DOCS ---
[[open.rules]]
url = "*.odt"
use = "office"
[[open.rules]]
url = "*.ods"
use = "office"
[[open.rules]]
url = "*.odp"
use = "office"
[[open.rules]]
url = "*.odg"
use = "office"
[[open.rules]]
url = "*.doc"
use = "office"
[[open.rules]]
url = "*.docx"
use = "office"
[[open.rules]]
url = "*.xls"
use = "office"
[[open.rules]]
url = "*.xlsx"
use = "office"
[[open.rules]]
url = "*.ppt"
use = "office"
[[open.rules]]
url = "*.pptx"
use = "office"
[[open.rules]]
url = "*.rtf"
use = "office"

# --- PDFs ---
[[open.rules]]
mime = "application/pdf"
use  = "pdf"

[[open.rules]]
url = "*.pdf"
use = "pdf"
[[open.rules]]
url = "*.djvu"
use = "pdf"
[[open.rules]]
url = "*.ps"
use = "pdf"
[[open.rules]]
url = "*.eps"
use = "pdf"
[[open.rules]]
url = "*.xps"
use = "pdf"

# --- FONTS ---
[[open.rules]]
mime = "font/*"
use  = "font"

[[open.rules]]
mime = "application/font-woff"
use  = "font"

[[open.rules]]
mime = "application/vnd.ms-fontobject"
use  = "font"

[[open.rules]]
url = "*.ttf"
use = "font"
[[open.rules]]
url = "*.otf"
use = "font"
[[open.rules]]
url = "*.woff"
use = "font"
[[open.rules]]
url = "*.woff2"
use = "font"

# --- FALLBACK (everything else) ---
[[open.rules]]
url = "*"
use  = "system"
